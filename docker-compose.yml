version: '3.8'

services:
  # 1. Sitio Virtual 1: Frontend Estático
  frontend:
    image: nginx:alpine
    container_name: sitio_frontend
    volumes:
      - ./frontend:/usr/share/nginx/html

  # 2. Sitio Virtual 2: Aplicación PHP
  php:
    image: php:8.2-apache
    container_name: sitio_php
    volumes:
      - ./php:/var/www/html

  # 3. Sitio Virtual 3: Aplicación Tomcat (Java)
  tomcat:
    image: tomcat:9.0
    container_name: sitio_tomcat

  # 4. El Proxy Principal (El Recepcionista: HTTPS, LDAP y Sitios Virtuales)
  proxy:
    build: ./proxy
    container_name: proxy_principal
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - php
      - tomcat

  prometheus:
    image: prom/prometheus:latest
    container_name: servidor_prometheus
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: panel_grafana
    ports:
      - "3000:3000"
    restart: always
